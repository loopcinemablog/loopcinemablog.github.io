<!-- _includes/giscus.html -->
<!--
  Insira este include no layout de posts (ex: _layouts/post.html) onde quiser que os comentários apareçam:
  {% include giscus.html %}

  Substitua os placeholders abaixo pelos valores do seu repositório / category do GitHub Discussions.
  Para encontrar repo-id e category-id, veja as instruções em README_FORUM.md neste repositório.
-->

<div id="comments">
  <!-- Giscus comments will be injected here -->
</div>

<script>
  // Configurações padrão — substitua OWNER/REPO e Category/IDs
  const GISCUS_CONFIG = {
    repo: "OWNER/REPO",                // ex: loopcinemablog/loopcinemablog.github.io
    repoId: "REPO_ID",                 // opcional, mas recomendado
    category: "Category",              // nome da categoria em Discussions
    categoryId: "CATEGORY_ID",         // opcional, mas recomendado
    mapping: "pathname",               // ou "url", "title", "og:title" — escolha como mapear cada página para uma discussão
    reactionsEnabled: "1",             // "1" para ativar reações
    emitMetadata: "0",                 // "1" para enviar metadata
    inputPosition: "bottom",           // "top" ou "bottom"
    theme: "light",                    // tema inicial (padrões: light, dark, preferred_color_scheme, etc.)
    lang: "pt-BR"                      // idioma
  };

  // Carrega o script do giscus com as configurações acima.
  (function loadGiscus(){
    const script = document.createElement('script');
    script.src = 'https://giscus.app/client.js';
    script.setAttribute('data-repo', GISCUS_CONFIG.repo);
    if (GISCUS_CONFIG.repoId && GISCUS_CONFIG.repoId !== 'REPO_ID') script.setAttribute('data-repo-id', GISCUS_CONFIG.repoId);
    script.setAttribute('data-category', GISCUS_CONFIG.category);
    if (GISCUS_CONFIG.categoryId && GISCUS_CONFIG.categoryId !== 'CATEGORY_ID') script.setAttribute('data-category-id', GISCUS_CONFIG.categoryId);
    script.setAttribute('data-mapping', GISCUS_CONFIG.mapping);
    script.setAttribute('data-reactions-enabled', GISCUS_CONFIG.reactionsEnabled);
    script.setAttribute('data-emit-metadata', GISCUS_CONFIG.emitMetadata);
    script.setAttribute('data-input-position', GISCUS_CONFIG.inputPosition);
    script.setAttribute('data-theme', GISCUS_CONFIG.theme);
    script.setAttribute('data-lang', GISCUS_CONFIG.lang);
    script.crossOrigin = 'anonymous';
    script.async = true;
    document.getElementById('comments').appendChild(script);
  })();

  // Função utilitária para trocar tema dinamicamente (se seu site suportar troca de tema)
  function setGiscusTheme(theme){
    const iframe = document.querySelector('iframe.giscus-frame');
    if (!iframe) return;
    iframe.contentWindow.postMessage({
      giscus: {
        setConfig: { theme }
      }
    }, 'https://giscus.app');
  }

  // Exemplo: se seu site tiver um toggle que dispara um evento "theme-change", atualize o giscus assim:
  document.addEventListener('theme-change', (e) => {
    const theme = e.detail && e.detail.theme ? e.detail.theme : 'light';
    setGiscusTheme(theme);
  });
</script>
