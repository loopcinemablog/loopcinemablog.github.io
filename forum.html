<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Loopcinema — Fórum</title>
  <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="/">Loopcinema</a>
      <button class="nav-toggle" aria-label="Abrir menu">☰</button>
      <nav class="nav">
        <a href="/">Início</a>
        <a href="/wiki.html">Wiki</a>
        <a href="/forum.html">Fórum</a>
        <a href="#rules">Regras</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <h1>Fórum</h1>
    <p>Espaço para a comunidade discutir: crie tópicos, responda e compartilhe novidades.</p>

    <section class="forum-list">
      <article class="thread">
        <h3><a href="#">Apresentações — diga oi!</a></h3>
        <p class="meta">Última resposta: — | 0 respostas</p>
      </article>

      <article class="thread">
        <h3><a href="#">Músicas favoritas</a></h3>
        <p class="meta">Última resposta: — | 0 respostas</p>
      </article>
    </section>

    <section class="new-thread">
      <h2>Criar novo tópico (modelo)</h2>
      <form>
        <label>Título<br><input type="text" name="title" placeholder="Título do tópico" /></label>
        <label>Conteúdo<br><textarea name="content" rows="6" placeholder="Escreva sua mensagem..."></textarea></label>
        <p><button class="btn">Enviar (demo)</button></p>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>© <span id="year-forum"></span> Loopcinema — Fórum</p>
    </div>
  </footer>

  <script src="/assets/js/main.js"></script>
</body>
</html>
